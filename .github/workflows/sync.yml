name: Sync Framer vers Vercel
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [framer-publish, cms-update]
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: node sync/scraper.js || [ $? -eq 1 ]
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - run: |
          git config user.name "FramerSync Bot"
          git config user.email "sync@geospherique.com"
          git add -A public/ sync/.state.json
          if git diff --staged --quiet; then
            echo "Rien a committer."
          else
            git commit -m "sync: Framer -> $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
