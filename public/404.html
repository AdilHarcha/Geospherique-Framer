<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page introuvable — Géosphérique</title>
  <meta name="description" content="Cette page n'existe pas.">
  <link rel="icon" href="/_cdn/framerusercontent.com/images/njEVkppev6A8e0Vlj9YgI2gtDc.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #000;
      color: #e8e8e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .logo {
      font-size: .85rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-bottom: 80px;
    }
    .code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 400;
      letter-spacing: -.02em;
      line-height: 1;
      color: rgba(255,255,255,.06);
      margin-bottom: 32px;
    }
    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: .04em;
      color: #fff;
      margin-bottom: 16px;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,.35);
      margin-bottom: 48px;
      line-height: 1.7;
    }
    .btn {
      display: inline-block;
      font-size: .75rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      border: 1px solid rgba(255,255,255,.12);
      padding: 12px 28px;
      border-radius: 2px;
      transition: color .2s, border-color .2s;
    }
    .btn:hover { color: #fff; border-color: rgba(255,255,255,.35); }
  </style>
</head>
<body>
  <a class="logo" href="/">Géosphérique</a>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou a été déplacée.</p>
  <a class="btn" href="/">Retour à l'accueil</a>
</body>
</html>
